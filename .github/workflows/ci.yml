# =============================================================================
#  Baby Care Tracker Web - 持续集成
#  触发：所有 PR 与 main 分支推送
#  内容：lint + typecheck + 构建 + 单测（如有）
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma Client
        working-directory: server
        run: pnpm db:generate

      - name: Lint client
        working-directory: client
        run: pnpm lint
        continue-on-error: true   # 渐进引入，先不阻塞

      - name: Typecheck client
        working-directory: client
        run: pnpm exec tsc -b --noEmit

      - name: Build client
        run: pnpm build:client

      - name: Build server
        run: pnpm build:server

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist-${{ github.sha }}
          path: client/dist
          retention-days: 7

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          tags: baby-care-tracker-web:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client-dist image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: client-dist
          tags: baby-care-tracker-web:ci-client
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
