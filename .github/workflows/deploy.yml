# =============================================================================
#  Baby Care Tracker Web - 持续部署
#  触发：
#    - master / main 分支推送（自动部署到生产）
#    - 手动触发（指定 tag）
#  目标：152.136.125.185 (Lighthouse)
# =============================================================================
name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: '部署 tag（默认 commit sha）'
        required: false
        default: ''

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # 部署不并发取消，避免拉到一半中断

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: production
      url: http://152.136.125.185

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          tags: |
            baby-care-tracker-web:${{ steps.tag.outputs.tag }}
            baby-care-tracker-web:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client-dist image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: client-dist
          tags: |
            baby-care-tracker-web:${{ steps.tag.outputs.tag }}-client
            baby-care-tracker-web:latest-client
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save & compress images
        run: |
          docker save \
            baby-care-tracker-web:${{ steps.tag.outputs.tag }} \
            baby-care-tracker-web:${{ steps.tag.outputs.tag }}-client \
            | gzip -1 > baby-care.tar.gz
          ls -lh baby-care.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload image & config (with rsync, resumable)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_deploy $USER@$HOST \
            "mkdir -p $PATH_REMOTE/docker && which rsync || (yum install -y rsync || apt-get install -y rsync)"

          # 镜像 tar：rsync + 压缩 + 可断点续传
          rsync -avz --partial --progress \
            -e "ssh -o ConnectTimeout=30 -o ServerAliveInterval=30 -i ~/.ssh/id_deploy" \
            baby-care.tar.gz \
            $USER@$HOST:$PATH_REMOTE/baby-care.tar.gz

          # 配置文件：小，直接 scp
          scp -C -o ConnectTimeout=30 -i ~/.ssh/id_deploy \
            docker/docker-compose.yml docker/nginx.conf \
            $USER@$HOST:$PATH_REMOTE/docker/

      - name: Render .env on server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_deploy $USER@$HOST bash -s <<EOF
          cat > $PATH_REMOTE/docker/.env <<ENV
          IMAGE_REGISTRY=baby-care-tracker-web
          IMAGE_TAG=$TAG
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
          AI_DAILY_QUOTA=${{ secrets.AI_DAILY_QUOTA }}
          AI_FETCH_TIMEOUT_MS=${{ secrets.AI_FETCH_TIMEOUT_MS }}
          PATROL_ENABLED=${{ secrets.PATROL_ENABLED }}
          ENV
          chmod 600 $PATH_REMOTE/docker/.env
          EOF

      - name: Load image & restart services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_deploy $USER@$HOST bash -s <<EOF
          set -euo pipefail
          cd $PATH_REMOTE
          echo '  -> 解压并加载镜像'
          gunzip -c baby-care.tar.gz | docker load
          rm -f baby-care.tar.gz

          echo '  -> 重启 compose'
          cd docker
          docker compose --env-file .env up -d --remove-orphans

          echo '  -> 清理 dangling 镜像'
          docker image prune -f
          EOF

      - name: Health check
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://$HOST/api/health; then
              echo ""
              echo "✅ 部署成功"
              exit 0
            fi
            echo "等待健康检查... ($i/60)"
            sleep 3
          done
          echo "❌ 健康检查超时"
          exit 1

      - name: Notify (optional)
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "部署状态：$STATUS"
          # TODO: 接入企业微信 / 飞书 / Slack webhook
