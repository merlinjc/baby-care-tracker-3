# =============================================================================
#  Baby Care Tracker Web - 持续部署
#  流程：构建 → push 到 ghcr.io → 服务器 pull
#  优势：跨境只传元数据，镜像走 ghcr 国际 CDN，比 scp 快 5-10 倍
#  触发：
#    - master / main 分支推送（自动部署到生产）
#    - 手动触发（指定 tag）
#  目标：152.136.125.185 (Lighthouse)
# =============================================================================
name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: '部署 tag（默认 commit sha）'
        required: false
        default: ''

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # merlinjc/baby-care-tracker-3

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write       # 允许推到 ghcr.io
    environment:
      name: production
      url: http://152.136.125.185

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # ghcr.io 要求小写仓库名
          IMAGE_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_lc=$IMAGE_LC" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_lc }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_lc }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client-dist image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: client-dist
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_lc }}:${{ steps.tag.outputs.tag }}-client
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_lc }}:latest-client
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload config files
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_deploy $USER@$HOST \
            "mkdir -p $PATH_REMOTE/docker"
          scp -C -o ConnectTimeout=30 -i ~/.ssh/id_deploy \
            docker/docker-compose.yml docker/nginx.conf \
            $USER@$HOST:$PATH_REMOTE/docker/

      - name: Render .env on server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
          TAG: ${{ steps.tag.outputs.tag }}
          IMAGE_LC: ${{ steps.tag.outputs.image_lc }}
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_deploy $USER@$HOST bash -s <<EOF
          cat > $PATH_REMOTE/docker/.env <<ENV
          IMAGE_REGISTRY=ghcr.io/$IMAGE_LC
          IMAGE_TAG=$TAG
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
          AI_DAILY_QUOTA=${{ secrets.AI_DAILY_QUOTA }}
          AI_FETCH_TIMEOUT_MS=${{ secrets.AI_FETCH_TIMEOUT_MS }}
          PATROL_ENABLED=${{ secrets.PATROL_ENABLED }}
          ENV
          chmod 600 $PATH_REMOTE/docker/.env
          EOF

      - name: Pull & restart services on server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PATH_REMOTE: ${{ secrets.DEPLOY_PATH }}
          TAG: ${{ steps.tag.outputs.tag }}
          IMAGE_LC: ${{ steps.tag.outputs.image_lc }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_deploy $USER@$HOST bash -s <<EOF
          set -euo pipefail
          cd $PATH_REMOTE/docker

          echo '  -> docker login ghcr.io'
          echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin

          echo '  -> pull 最新镜像'
          docker compose --env-file .env pull

          echo '  -> 重启 compose'
          docker compose --env-file .env up -d --remove-orphans

          echo '  -> 清理历史镜像'
          docker image prune -f

          echo '  -> docker logout ghcr.io'
          docker logout ghcr.io
          EOF

      - name: Health check
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://$HOST/api/health; then
              echo ""
              echo "✅ 部署成功"
              exit 0
            fi
            echo "等待健康检查... ($i/60)"
            sleep 3
          done
          echo "❌ 健康检查超时"
          echo "查看日志：ssh -i BJ_Baby_Care_Tracker.pem root@$HOST 'cd /opt/baby-care/docker && docker compose logs --tail=100'"
          exit 1

      - name: Notify (optional)
        if: always()
        run: |
          echo "部署状态：${{ job.status }}"
          # TODO: 接入企业微信 / 飞书 / Slack webhook
