# =============================================================================
#  Baby Care Tracker Web - Nginx 配置
#  服务器：152.136.125.185 (OpenCloudOS 9.4)
#  - 前端 SPA：从 /usr/share/nginx/html 提供（来自 client/dist）
#  - 后端 API：反向代理到 server:3000（同 docker network 内）
# =============================================================================

# 上游：Node.js 后端容器
upstream baby_api {
    server server:3000;
    keepalive 32;
}

# HTTP（生产可改 301 到 HTTPS；过渡期允许直接访问）
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 客户端最大上传体积（头像等）
    client_max_body_size 10m;

    # ---- 安全头 ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ---- 健康检查（不走 SPA fallback） ----
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- 后端 API ----
    location /api/ {
        proxy_pass         http://baby_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # SSE / 流式 AI 响应
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ---- 前端静态资源（带 hash，长缓存） ----
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- 前端 SPA fallback ----
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存，保证发版立即生效
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

