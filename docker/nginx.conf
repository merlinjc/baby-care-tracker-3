# =============================================================================
#  Baby Care Tracker Web - Nginx 配置
#  服务器：152.136.125.185 (OpenCloudOS 9.4)
#  域名：www.neo3.cn / neo3.cn  (TrustAsia DV TLS RSA)
#  - 前端 SPA：/usr/share/nginx/html (来自 client/dist)
#  - 后端 API：反向代理到 server:3000
#  - 80  → 301 → https://www.neo3.cn (含裸域 301)
#  - 443 → 启用 TLS 1.2/1.3 + HSTS
# =============================================================================

# 上游：Node.js 后端容器
upstream baby_api {
    server server:3000;
    keepalive 32;
}

# ----------------------------------------------------------------------------
#  公共 SSL 参数（被多 server 复用）
# ----------------------------------------------------------------------------
# 现代加密套件，仅启用 TLS 1.2 / 1.3
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
ssl_prefer_server_ciphers off;
ssl_session_timeout 1d;
ssl_session_cache   shared:SSL:50m;
ssl_session_tickets off;

# ----------------------------------------------------------------------------
#  80 端口：所有 HTTP 流量统一跳到 https://www.neo3.cn
#          （包含 default_server，IP 直访 / 未知域名也会跳到 www）
#          API 路径用 308（保留 method/body），其他用 301
# ----------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 健康检查仍允许 80 走（用于 docker healthcheck / 内网监控）
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API 请求用 308 保留 method 与 body
    # （HTTP 规范：301/302 浏览器会把 POST 转 GET，308 则保留原 method）
    # 防御场景：从 http://IP/ 加载的 SPA 发 POST /api/... 时不致 method 被吞
    location /api/ {
        return 308 https://www.neo3.cn$request_uri;
    }

    # 其他静态资源跳 https://www.neo3.cn（保留 path/query）
    location / {
        return 301 https://www.neo3.cn$request_uri;
    }
}

# ----------------------------------------------------------------------------
#  443 端口 - 裸域 neo3.cn → 301 跳到 www.neo3.cn（仍走 HTTPS）
# ----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name neo3.cn;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    return 301 https://www.neo3.cn$request_uri;
}

# ----------------------------------------------------------------------------
#  443 端口 - 主站点 www.neo3.cn
# ----------------------------------------------------------------------------
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name www.neo3.cn;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 客户端最大上传体积（头像等）
    client_max_body_size 10m;

    # ---- 安全头 ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # 简版 CSP（按需收紧；目前允许 inline 以兼容 vite 内联样式）
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://www.neo3.cn; font-src 'self' data:" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ---- 健康检查 ----
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- 后端 API ----
    location /api/ {
        proxy_pass         http://baby_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # SSE / 流式 AI 响应
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ---- 前端静态资源（带 hash，长缓存） ----
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        # 本 location 下 add_header 会覆盖 server 级，需重复安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        try_files $uri =404;
    }

    # ---- 前端 SPA fallback ----
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存，保证发版立即生效
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;

        # nginx 的 add_header 只继承到"最近一级有 add_header 的块"
        # 一旦 location 里定义了 add_header，server 块的全部都会被忽略
        # 所以这里需要重复声明所有安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://www.neo3.cn; font-src 'self' data:" always;
    }
}
