<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- 背景渐变 - 美拉德色系 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B896"/>
      <stop offset="100%" style="stop-color:#8B7B6B"/>
    </linearGradient>
    
    <!-- 脸部渐变 -->
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C9"/>
      <stop offset="100%" style="stop-color:#FFDAB3"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5A4A3A" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- 宝宝脸部 -->
  <ellipse cx="100" cy="105" rx="55" ry="60" fill="url(#faceGradient)" filter="url(#shadow)"/>
  
  <!-- 头发/刘海 -->
  <path d="M50 85 Q60 55 100 50 Q140 55 150 85 Q145 70 100 65 Q55 70 50 85" fill="#6B5B4B"/>
  
  <!-- 左眼 -->
  <ellipse cx="80" cy="100" rx="12" ry="8" fill="#3A3A3A"/>
  <ellipse cx="83" cy="98" rx="4" ry="3" fill="#FFFFFF"/>
  
  <!-- 右眼 -->
  <ellipse cx="120" cy="100" rx="12" ry="8" fill="#3A3A3A"/>
  <ellipse cx="123" cy="98" rx="4" ry="3" fill="#FFFFFF"/>
  
  <!-- 眉毛 -->
  <path d="M68 85 Q80 82 90 87" stroke="#6B5B4B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M110 87 Q120 82 132 85" stroke="#6B5B4B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- 红润脸颊 -->
  <ellipse cx="65" cy="115" rx="12" ry="8" fill="#FFB6A3" opacity="0.6"/>
  <ellipse cx="135" cy="115" rx="12" ry="8" fill="#FFB6A3" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <ellipse cx="100" cy="118" rx="5" ry="4" fill="#FFD4C4"/>
  
  <!-- 微笑 -->
  <path d="M85 132 Q100 145 115 132" stroke="#8B6B5B" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 小装饰 - 头顶小星星 -->
  <circle cx="100" cy="38" r="4" fill="#FFE4B5"/>
  <circle cx="90" cy="42" r="2.5" fill="#FFE4B5" opacity="0.8"/>
  <circle cx="110" cy="42" r="2.5" fill="#FFE4B5" opacity="0.8"/>
</svg>